version: '3.8'
services:
  app:
    build: .
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: laravel
    networks:
      - app-network

volumes:
  storage_data:

networks:
  app-network:
    driver: bridge
